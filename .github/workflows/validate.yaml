name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          # Brand assets live in the home-assistant/brands repository, which
          # only accepts integrations that ship with Home Assistant or are in
          # the HACS default list. A custom repository cannot satisfy this.
          ignore: brands

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          # The default cache lookup only matches requirements.txt.
          cache-dependency-path: requirements-test.txt
      - run: pip install -r requirements-test.txt
      - run: pytest tests -v
